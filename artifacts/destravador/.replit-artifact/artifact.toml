kind = "web"
previewPath = "/"
title = "Destravador de Vendas"
version = "1.0.0"
id = "artifacts/destravador"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18450

[services.development]
run = "pnpm --filter @workspace/destravador run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/destravador", "run", "build" ]
serve = "static"
publicDir = "artifacts/destravador/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18450"
BASE_PATH = "/"
